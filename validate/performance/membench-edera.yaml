apiVersion: v1
kind: Pod
metadata:
  name: membench-edera
  labels:
    app: mem-bench
  annotations:
    dev.edera/cpu: "8"
spec:
  runtimeClassName: edera
  restartPolicy: Never
  containers:
  - name: bench
    image: alpine:3.21
    command: ["sh", "-c", "apk add --no-cache sysbench > /dev/null 2>&1 && sleep infinity"]
    resources:
      requests:
        cpu: "8"
        memory: 2Gi
      limits:
        cpu: "8"
        memory: 2Gi
