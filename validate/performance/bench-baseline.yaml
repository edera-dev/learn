apiVersion: v1
kind: Pod
metadata:
  name: bench-baseline
  labels:
    app: cpu-bench
spec:
  restartPolicy: Never
  containers:
  - name: bench
    image: alpine:3.21
    command: ["sh", "-c", "apk add --no-cache sysbench > /dev/null 2>&1 && sleep infinity"]
    resources:
      requests:
        cpu: "8"
        memory: 2Gi
      limits:
        cpu: "8"
        memory: 2Gi
